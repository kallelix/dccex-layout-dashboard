# nginx site for the DCC-EX layout dashboard (static SPA).
# Plain HTTP on purpose: the page must open ws:// to the CommandStation,
# which a browser blocks from an https:// page (mixed content) and the CS
# can't do wss://. Do NOT put a TLS reverse proxy in front of this.
#
# Install in the LXC:
#   cp nginx-dashboard.conf /etc/nginx/sites-available/dashboard
#   ln -sf /etc/nginx/sites-available/dashboard /etc/nginx/sites-enabled/dashboard
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
